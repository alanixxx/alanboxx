<!DOCTYPE html>
<html lang="pl">

    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; scroll-behavior: smooth; color: white; overflow-x: hidden; }
        #hero-bg { position: absolute; inset: 0; z-index: -1; transition: background-image 1.5s ease-in-out; background-size: cover; background-position: center; filter: brightness(0.2) blur(8px); }
        .hero-gradient { position: absolute; inset: 0; background: radial-gradient(circle at center, transparent, #09090b); }
        .slider-container { width: 100%; overflow: hidden; padding: 20px 0; }
        .slider-track { display: flex; gap: 1.5rem; width: max-content; animation: scroll 100s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-50% - 0.75rem)); } }
        .slider-track:hover { animation-play-state: paused; }
        .movie-card { width: 260px; flex-shrink: 0; transition: transform 0.2s; cursor: pointer; border-radius: 24px; overflow: hidden; border: 1px solid #27272a; }
        @media (min-width: 768px) { .movie-card { width: 300px; } }
        .movie-card:hover { transform: scale(1.05); border-color: #22c55e; }
        .hidden-section { display: none !important; }
        .modal-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px); align-items: center; justify-content: center; padding: 15px; }
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #333; font-size: 2rem; cursor: pointer; transition: color 0.2s; }
        .star-rating label:hover, .star-rating label:hover ~ label, .star-rating input:checked ~ label { color: #22c55e; }
        .custom-scroll::-webkit-scrollbar { height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #22c55e; border-radius: 10px; }
        .doomsday-text { color: #22c55e; text-shadow: 0 0 15px rgba(34, 197, 94, 0.6); }
        .glow-green { box-shadow: 0 0 30px rgba(34, 197, 94, 0.2); border-color: rgba(34, 197, 94, 0.4); }
    </style>
</head>
<body class="selection:bg-green-600">

            </div>
        </div>

    <main id="home-page">

                HISTORIE, <span class="text-green-500">KTÓRE</span> ZOSTAJĄ.
            </h2>
        </header>

        <div class="slider-container">
            <div class="slider-track" id="main-slider"></div>
        </div>

        <section class="max-w-6xl mx-auto px-5 py-16">

                <div class="w-full md:w-1/3">
                    <img src="./static/doomsday.jpg" class="rounded-3xl shadow-2xl border border-green-500/30 transform -rotate-3 hover:rotate-0 transition-transform duration-500">
                </div>

                    <p class="mt-8 text-zinc-500 font-bold uppercase text-[10px] tracking-widest italic">Oczekiwanie na reset multiwersum...</p>
                </div>
            </div>
        </section>

            <form class="flex flex-col sm:flex-row gap-3 max-w-2xl mx-auto">
                <input type="email" placeholder="Twój e-mail..." class="flex-1 bg-zinc-800 border border-zinc-700 rounded-xl px-6 py-4 outline-none">
                <button type="button" class="bg-green-600 text-black font-black px-10 py-4 rounded-xl uppercase italic hover:bg-green-400">Subskrybuj</button>
            </form>
        </section>
    </main>

    <div id="library-page" class="hidden-section max-w-7xl mx-auto p-5 py-12">

    </div>

    </div>

    <div id="movie-modal" class="modal-overlay" onclick="if(event.target === this) toggleModal('movie-modal', false)">

            <div class="w-full md:w-2/5 h-64 md:h-auto shrink-0">

            </div>
            <div class="flex-1 p-8 md:p-12 overflow-y-auto">
                <h2 id="modal-title" class="text-4xl md:text-6xl font-black italic uppercase mb-4 text-green-500 tracking-tighter"></h2>
                <p id="modal-desc" class="text-zinc-400 text-lg mb-8 leading-relaxed"></p>
                <div class="flex gap-4 mb-8">
                    <div class="bg-zinc-900 px-6 py-4 rounded-2xl border border-zinc-800">
                        <span class="text-zinc-500 text-[10px] block font-black">Score</span>
                        <span id="modal-rating" class="text-xl font-black text-yellow-500 italic"></span>
                    </div>
                </div>

            </div>
        </div>
    </div>

            </form>
        </div>
    </div>

        let userLists = JSON.parse(localStorage.getItem('userCustomLists')) || [{ name: 'Moje Ulubione', movies: [] }];

        // COUNTDOWN
        function updateCountdown() {
            const target = new Date('December 18, 2026 00:00:00').getTime();
            const now = new Date().getTime();
            const diff = target - now;
            const months = Math.floor(diff / (1000 * 60 * 60 * 24 * 30.44));
            const days = Math.floor((diff % (1000 * 60 * 60 * 24 * 30.44)) / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('countdown').innerHTML = `
                <div><span class="doomsday-text">${months < 10 ? '0'+months : months}</span><span class="block text-[10px] text-zinc-600 mt-2">Miesięcy</span></div>
                <div><span class="doomsday-text">${days < 10 ? '0'+days : days}</span><span class="block text-[10px] text-zinc-600 mt-2">Dni</span></div>
                <div><span class="doomsday-text">${hours < 10 ? '0'+hours : hours}</span><span class="block text-[10px] text-zinc-600 mt-2">Godz</span></div>
                <div><span class="doomsday-text">${mins < 10 ? '0'+mins : mins}</span><span class="block text-[10px] text-zinc-600 mt-2">Min</span></div>`;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // HERO BG
        function rotateHeroBg() {
            const randomMovie = movies[Math.floor(Math.random() * movies.length)];
            document.getElementById('hero-bg').style.backgroundImage = `url('${randomMovie.img}')`;
        }
        setInterval(rotateHeroBg, 5000);
        rotateHeroBg();

        // LIBRARY & TABLE
        function renderTable() {
            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedData = filteredMovies.slice(startIndex, startIndex + itemsPerPage);
            const tbody = document.getElementById('library-table-body');
            const wl = JSON.parse(localStorage.getItem('watchlist')) || [];

            tbody.innerHTML = paginatedData.map(m => `
                <tr class="border-b border-zinc-800/50 hover:bg-green-500/5 transition-all group">
                    <td class="p-4 md:p-6 flex items-center gap-4">
                        <img src="${m.img}" class="w-12 h-16 object-cover rounded-lg shrink-0" onerror="this.src='https://via.placeholder.com/150x200?text=Brak+Plakatu'">
                        <span class="font-black italic uppercase text-lg">${m.title}</span>
                    </td>
                    <td class="p-4 md:p-6 text-zinc-500 font-black text-xs uppercase">${m.category}</td>
                    <td class="p-4 md:p-6 text-zinc-400 font-bold italic">${m.date}</td>
                    <td class="p-4 md:p-6 font-black text-green-500 italic">★ ${m.rating}</td>
                    <td class="p-4 md:p-6 text-right">
                        <div class="flex items-center justify-end gap-3">
                            <button onclick="toggleWatchlist('${m.id}')" class="text-zinc-600 transition ${wl.includes(m.id) ? 'text-green-500 scale-125' : ''}">❤</button>
                            <button onclick="openModalById('${m.id}')" class="bg-zinc-800 hover:bg-green-600 hover:text-black px-6 py-2 rounded-full text-[10px] font-black uppercase transition-all">Opis</button>
                        </div>
                    </td>
                </tr>`).join('');
            renderPagination();
        }

        function openModalById(id) {
            const m = movies.find(x => x.id === id);
            if(!m) return;
            currentMovieId = m.id;
            // Clear content before showing
            document.getElementById('modal-title').innerText = m.title;
            document.getElementById('modal-img').src = m.img;
            document.getElementById('modal-desc').innerText = m.desc;
            document.getElementById('modal-rating').innerText = m.rating;
            document.getElementById('modal-trailer-link').href = m.trailer || '#';
            toggleModal('movie-modal', true);
        }

        // NAVIGATION
        function hideAll() { document.querySelectorAll('main, #library-page, #lists-page').forEach(el => el.classList.add('hidden-section')); }
        function showHome() { hideAll(); document.getElementById('home-page').classList.remove('hidden-section'); }
        function showLibrary() { hideAll(); document.getElementById('library-page').classList.remove('hidden-section'); renderTable(); }
        function showMyLists() { hideAll(); document.getElementById('lists-page').classList.remove('hidden-section'); renderCustomLists(); }

        // AUTH
        function handleLogin(e) { e.preventDefault(); localStorage.setItem('hubUser', document.getElementById('username').value); location.reload(); }
        function logout() { localStorage.removeItem('hubUser'); location.reload(); }
        function updateAuthUI() { 
            const user = localStorage.getItem('hubUser');
            if(user) {
                document.getElementById('auth-section').innerHTML = `
                    <span class="text-white font-black italic text-xs uppercase mr-2">${user}</span>
                    <button onclick="logout()" class="text-[9px] font-black uppercase text-red-600">Wyloguj</button>
                `;
            }
        }

        function handleSearch() {
            const t = document.getElementById('movie-search').value.toLowerCase();
            filteredMovies = movies.filter(m => m.title.toLowerCase().includes(t));
            currentPage = 1; renderTable();
        }

        function toggleWatchlist(id) {
            let wl = JSON.parse(localStorage.getItem('watchlist')) || [];
            wl = wl.includes(id) ? wl.filter(x => x !== id) : [...wl, id];
            localStorage.setItem('watchlist', JSON.stringify(wl));
            renderTable();
        }

        function renderPagination() {
            const total = Math.ceil(filteredMovies.length / itemsPerPage);
            let html = '';
            for (let i = 1; i <= total; i++) {
                html += `<button onclick="currentPage=${i};renderTable()" class="w-10 h-10 border border-zinc-800 rounded-lg font-black ${i === currentPage ? 'bg-green-600 text-black' : 'text-zinc-500'}">${i}</button>`;
            }
            document.getElementById('pagination-controls').innerHTML = html;
        }

        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }

        // INIT
        updateAuthUI();
        document.getElementById('main-slider').innerHTML = [...movies].sort(() => 0.5 - Math.random()).slice(0, 15).map(m => `
            <div class="movie-card bg-zinc-900" onclick="openModalById('${m.id}')">
                <img src="${m.img}" class="w-full h-[400px] object-cover" onerror="this.src='https://via.placeholder.com/300x400?text=Film'">
                <div class="p-6 text-center font-black uppercase italic">
                    <div class="text-xl mb-1">${m.title}</div>
                    <div class="text-green-500 text-xs">★ ${m.rating}</div>
                </div>
            </div>`).join('');
    </script>
