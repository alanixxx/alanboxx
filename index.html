<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Hub | Custom Lists & Trailers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; scroll-behavior: smooth; color: white; }
        
        .slider-container { width: 100%; overflow: hidden; padding: 20px 0; }
        .slider-track { display: flex; gap: 1.5rem; width: max-content; animation: scroll 100s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-50% - 0.75rem)); } }
        .slider-track:hover { animation-play-state: paused; }
        
        .movie-card { 
            width: 260px; flex-shrink: 0; transition: transform 0.2s ease-in-out; 
            cursor: pointer; border-radius: 24px; overflow: hidden; border: 1px solid #27272a;
        }
        @media (min-width: 768px) { .movie-card { width: 300px; } }
        .movie-card:hover { transform: scale(1.05); border-color: #dc2626; box-shadow: 0 20px 25px -5px rgba(220, 38, 38, 0.2); }

        .hidden-section { display: none !important; }
        .modal-overlay { 
            display: none; position: fixed; inset: 0; z-index: 100; 
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px); 
            align-items: center; justify-content: center; padding: 15px;
        }

        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #333; font-size: 2rem; cursor: pointer; transition: color 0.2s; }
        .star-rating label:hover, .star-rating label:hover ~ label, .star-rating input:checked ~ label { color: #facc15; }

        .custom-scroll::-webkit-scrollbar { height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 10px; }
        .page-btn.active { background-color: #dc2626; color: white; border-color: #dc2626; }
    </style>
</head>
<body class="selection:bg-red-600">

                <button onclick="showLibrary()" class="text-zinc-400 hover:text-white font-bold uppercase text-[10px] md:text-xs tracking-widest transition">Filmy</button>
                <button onclick="showMyLists()" class="text-zinc-400 hover:text-white font-bold uppercase text-[10px] md:text-xs tracking-widest transition">Listy</button>
                <div id="auth-section">
                    <button onclick="toggleModal('login-modal', true)" class="bg-red-600 hover:bg-red-700 text-white px-4 md:px-6 py-2 rounded-full font-black uppercase text-[9px] md:text-[10px] transition-all">Zaloguj się</button>
                </div>
            </div>
        </div>
    </nav>

        <div class="slider-container">

        </div>

        let currentMovieId = null;
        let currentPage = 1;
        const itemsPerPage = 6;
        let filteredMovies = [...movies];
        
        // ZARZĄDZANIE LISTAMI
        let userLists = JSON.parse(localStorage.getItem('userCustomLists')) || [{ name: 'Moje Ulubione', movies: [] }];

        function initSlider() {
            const track = document.getElementById('main-slider');
            track.innerHTML = [...movies, ...movies].map(m => `
                <div class="movie-card bg-zinc-900" onclick="openModalById('${m.id}')">
                    <img src="${m.img}" class="w-full h-[350px] md:h-[400px] object-cover">
                    <div class="p-6 text-center font-black italic uppercase tracking-tighter">
                        <div class="text-lg md:text-xl mb-1 truncate">${m.title}</div>
                        <div class="text-red-600 text-[10px] tracking-[0.2em] uppercase italic">★ ${m.rating}</div>
                    </div>
                </div>
            `).join('');
        }

        // --- NAWIGACJA ---
        function showLibrary() {
            document.querySelectorAll('main, #library-page, #lists-page').forEach(el => el.classList.add('hidden-section'));
            document.getElementById('library-page').classList.remove('hidden-section');
            filterCategory('Wszystkie');
        }
        function showHome() {
            document.querySelectorAll('main, #library-page, #lists-page').forEach(el => el.classList.add('hidden-section'));
            document.getElementById('home-page').classList.remove('hidden-section');
        }
        function showMyLists() {
            document.querySelectorAll('main, #library-page, #lists-page').forEach(el => el.classList.add('hidden-section'));
            document.getElementById('lists-page').classList.remove('hidden-section');
            renderCustomLists();
        }

        // --- CUSTOM LISTS ---
        function createNewList() {
            const name = prompt("Podaj nazwę nowej listy:");
            if (name) {
                userLists.push({ name, movies: [] });
                saveLists();
                renderCustomLists();
            }
        }

        function renameList(index) {
            const newName = prompt("Nowa nazwa listy:", userLists[index].name);
            if (newName) {
                userLists[index].name = newName;
                saveLists();
                renderCustomLists();
            }
        }

        function deleteList(index) {
            if (confirm("Czy na pewno chcesz usunąć tę listę?")) {
                userLists.splice(index, 1);
                saveLists();
                renderCustomLists();
            }
        }

        function addToList(movieId, listIndex) {
            if (!userLists[listIndex].movies.includes(movieId)) {
                userLists[listIndex].movies.push(movieId);
                saveLists();
                alert(`Dodano do listy: ${userLists[listIndex].name}`);
            } else {
                alert("Ten film już jest na tej liście.");
            }
        }

        function removeFromList(listIndex, movieId) {
            userLists[listIndex].movies = userLists[listIndex].movies.filter(id => id !== movieId);
            saveLists();
            renderCustomLists();
        }

        function saveLists() { localStorage.setItem('userCustomLists', JSON.stringify(userLists)); }

        function renderCustomLists() {
            const container = document.getElementById('custom-lists-container');
            if (userLists.length === 0) {
                container.innerHTML = `<p class="text-zinc-600 italic">Brak list. Utwórz nową, aby zacząć kolekcjonować filmy.</p>`;
                return;
            }
            container.innerHTML = userLists.map((list, idx) => `
                <div class="bg-zinc-900/50 p-6 md:p-10 rounded-[40px] border border-zinc-800">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 text-center md:text-left">
                        <h3 class="text-3xl font-black italic uppercase tracking-tighter text-white underline decoration-red-600 decoration-4 underline-offset-8">${list.name}</h3>
                        <div class="space-x-4">
                            <button onclick="renameList(${idx})" class="text-xs font-black uppercase text-zinc-500 hover:text-white">Zmień nazwę</button>
                            <button onclick="deleteList(${idx})" class="text-xs font-black uppercase text-red-600 hover:text-red-400">Usuń listę</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${list.movies.length ? list.movies.map(id => {
                            const m = movies.find(x => x.id === id);
                            const uRating = localStorage.getItem(`rating-${id}`) || '-';
                            return `
                                <div class="bg-zinc-950 p-4 rounded-3xl border border-zinc-800 flex items-center gap-4 group">
                                    <img src="${m.img}" class="w-16 h-20 object-cover rounded-xl shadow-lg">
                                    <div class="flex-1 text-left">
                                        <h4 class="font-black italic uppercase text-sm mb-1">${m.title}</h4>
                                        <p class="text-[10px] text-zinc-500 uppercase font-black tracking-widest">Ocena: <span class="text-yellow-500">★ ${uRating}</span></p>
                                        <button onclick="removeFromList(${idx}, '${m.id}')" class="text-[9px] text-red-500 uppercase font-black mt-2 hover:underline">Usuń</button>
                                    </div>
                                    <button onclick="openModalById('${m.id}')" class="text-zinc-700 group-hover:text-white transition">➔</button>
                                </div>
                            `;
                        }).join('') : `<p class="text-zinc-700 text-xs italic col-span-3">Ta lista jest pusta.</p>`}
                    </div>
                </div>
            `).join('');
        }

        // --- TABELA ---
        function renderTable() {
            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedData = filteredMovies.slice(startIndex, startIndex + itemsPerPage);
            const tbody = document.getElementById('library-table-body');

            tbody.innerHTML = paginatedData.map(m => `
                <tr class="border-b border-zinc-800/50 hover:bg-white/5 transition-colors group">
                    <td class="p-4 md:p-6 flex items-center gap-4">
                        <img src="${m.img}" class="w-10 h-14 md:w-12 md:h-16 object-cover rounded-lg shadow-xl">
                        <span class="font-black italic uppercase text-sm md:text-lg">${m.title}</span>
                    </td>
                    <td class="p-4 md:p-6 text-zinc-500 font-black text-[9px] uppercase tracking-widest">${m.category}</td>
                    <td class="p-4 md:p-6 text-zinc-400 font-bold italic text-sm">${m.date}</td>
                    <td class="p-4 md:p-6 font-black text-red-600 italic">★ ${m.rating}</td>
                    <td class="p-4 md:p-6 text-right">
                        <select onchange="if(this.value !== '') addToList('${m.id}', this.value); this.value='';" class="bg-zinc-800 text-[9px] font-black uppercase rounded-lg p-1 outline-none mr-2">
                            <option value="">+ Dodaj</option>
                            ${userLists.map((l, i) => `<option value="${i}">${l.name}</option>`).join('')}
                        </select>
                        <button onclick="openModalById('${m.id}')" class="bg-zinc-800 group-hover:bg-red-600 px-4 py-2 rounded-full text-[10px] font-black uppercase italic text-white transition-all">Opis</button>
                    </td>
                </tr>
            `).join('');
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredMovies.length / itemsPerPage);
            const container = document.getElementById('pagination-controls');
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button onclick="currentPage=${i};renderTable()" class="page-btn w-8 h-8 border border-zinc-800 rounded-lg font-black italic text-xs ${i === currentPage ? 'active' : 'text-zinc-500'}">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function handleSearch() {
            const term = document.getElementById('movie-search').value.toLowerCase();
            filteredMovies = movies.filter(m => m.title.toLowerCase().includes(term));
            currentPage = 1;
            renderTable();
        }

        function filterCategory(cat) {
            document.querySelectorAll('.cat-btn').forEach(btn => {
                if (btn.innerText === cat) { btn.classList.replace('bg-zinc-900', 'bg-red-600'); btn.classList.replace('text-zinc-400', 'text-white'); }
                else { btn.classList.replace('bg-red-600', 'bg-zinc-900'); btn.classList.replace('text-white', 'text-zinc-400'); }
            });
            filteredMovies = cat === 'Wszystkie' ? movies : movies.filter(m => m.category === cat);
            currentPage = 1;
            renderTable();
        }

        function toggleModal(id, show) {
            document.getElementById(id).style.display = show ? 'flex' : 'none';
            document.body.style.overflow = show ? 'hidden' : 'auto';
        }

        function openModalById(id) {
            const m = movies.find(x => x.id === id);
            currentMovieId = m.id;
            document.getElementById('modal-title').innerText = m.title;
            document.getElementById('modal-img').src = m.img;
            document.getElementById('modal-desc').innerText = m.desc;
            document.getElementById('modal-rating').innerText = m.rating;
            document.getElementById('modal-date').innerText = m.date;
            document.getElementById('modal-trailer-link').href = m.trailer; // TRAILER FIXED
            
            const saved = localStorage.getItem(`rating-${m.id}`);
            document.getElementsByName('u-rating').forEach(s => s.checked = (s.value === saved));
            document.getElementById('save-status').innerText = saved ? 'Ocena: '+saved+'/10' : '';
            toggleModal('movie-modal', true);
        }

        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            localStorage.setItem('hubUser', user);
            updateAuthUI();
            toggleModal('login-modal', false);
        }

        function updateAuthUI() {
            const user = localStorage.getItem('hubUser');
            if(user) {
                document.getElementById('auth-section').innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-white font-black italic underline decoration-red-600 decoration-4 underline-offset-4 uppercase text-xs">${user}</span>
                        <button onclick="localStorage.removeItem('hubUser'); location.reload();" class="text-[9px] text-zinc-500 font-black uppercase">Wyloguj</button>
                    </div>
                `;
            }
        }

        document.getElementById('star-group').addEventListener('change', (e) => {
            if (currentMovieId) {
                localStorage.setItem(`rating-${currentMovieId}`, e.target.value);
                document.getElementById('save-status').innerText = 'Twoja ocena: ' + e.target.value + '/10';
                if (!document.getElementById('lists-page').classList.contains('hidden-section')) renderCustomLists();
            }
        });

        updateAuthUI();
        initSlider();
    </script>
</body>
</html>
