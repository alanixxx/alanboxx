<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Hub | Pro Authority</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; scroll-behavior: smooth; color: white; overflow-x: hidden; }
        
        /* Dynamiczne tło Hero */
        #hero-bg { position: absolute; inset: 0; z-index: -1; transition: background-image 1.5s ease-in-out; background-size: cover; background-position: center; filter: brightness(0.2) blur(8px); }
        .hero-gradient { position: absolute; inset: 0; background: radial-gradient(circle at center, transparent, #09090b); }

        /* Slider */
        .slider-container { width: 100%; overflow: hidden; padding: 20px 0; }
        .slider-track { display: flex; gap: 1.5rem; width: max-content; animation: scroll 100s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-50% - 0.75rem)); } }
        .slider-track:hover { animation-play-state: paused; }
        
        .movie-card { width: 260px; flex-shrink: 0; transition: transform 0.2s; cursor: pointer; border-radius: 24px; overflow: hidden; border: 1px solid #27272a; }
        @media (min-width: 768px) { .movie-card { width: 300px; } }
        .movie-card:hover { transform: scale(1.05); border-color: #dc2626; }

        .hidden-section { display: none !important; }
        .modal-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px); align-items: center; justify-content: center; padding: 15px; }

        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #333; font-size: 2rem; cursor: pointer; transition: color 0.2s; }
        .star-rating label:hover, .star-rating label:hover ~ label, .star-rating input:checked ~ label { color: #facc15; }

        .custom-scroll::-webkit-scrollbar { height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 10px; }
        .page-btn.active { background-color: #dc2626; color: white; border-color: #dc2626; }
        
        .heart-active { color: #dc2626 !important; transform: scale(1.2); }
    </style>
</head>

        // --- 6. DYNAMICZNE TŁO HERO ---
        function rotateHeroBg() {
            const bg = document.getElementById('hero-bg');
            const randomMovie = movies[Math.floor(Math.random() * movies.length)];
            bg.style.backgroundImage = `url('${randomMovie.img}')`;

            const releaseDate = new Date('May 1, 2026 00:00:00').getTime();
            const now = new Date().getTime();
            const diff = releaseDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('countdown').innerHTML = `
                <div>${days}<span class="block text-[10px] text-zinc-500 uppercase not-italic">Dni</span></div>
                <div>${hours}<span class="block text-[10px] text-zinc-500 uppercase not-italic">Godz</span></div>
                <div>${mins}<span class="block text-[10px] text-zinc-500 uppercase not-italic">Min</span></div>`;
        }
        setInterval(updateCountdown, 60000);
        updateCountdown();

        // --- 3. SORTOWANIE ---
        function sortMovies(criteria) {
            if (criteria === 'date') {
                filteredMovies.sort((a, b) => b.date - a.date);
            } else if (criteria === 'rating') {
                filteredMovies.sort((a, b) => parseFloat(b.rating) - parseFloat(a.rating));
            }
            currentPage = 1;
            renderTable();
        }

        // --- 1. WATCHLIST (SERCA) ---
        function toggleWatchlist(id) {
            if (watchlist.includes(id)) {
                watchlist = watchlist.filter(mId => mId !== id);
            } else {
                watchlist.push(id);
            }
            localStorage.setItem('watchlist', JSON.stringify(watchlist));
            renderTable();
        }

        function initSlider() {
            const track = document.getElementById('main-slider');
            track.innerHTML = [...movies, ...movies].map(m => `
                <div class="movie-card bg-zinc-900" onclick="openModalById('${m.id}')">
                    <img src="${m.img}" class="w-full h-[350px] md:h-[400px] object-cover">
                    <div class="p-6 text-center font-black italic uppercase tracking-tighter">
                        <div class="text-lg md:text-xl mb-1 truncate">${m.title}</div>
                        <div class="text-red-600 text-[10px] tracking-[0.2em] uppercase italic">★ ${m.rating}</div>
                    </div>
                </div>`).join('');
        }

        function renderTable() {
            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedData = filteredMovies.slice(startIndex, startIndex + itemsPerPage);
            const tbody = document.getElementById('library-table-body');

            tbody.innerHTML = paginatedData.map(m => {
                const isLiked = watchlist.includes(m.id);
                return `
                <tr class="border-b border-zinc-800/50 hover:bg-white/5 transition-colors group">
                    <td class="p-4 md:p-6 flex items-center gap-4">
                        <img src="${m.img}" class="w-10 h-14 md:w-12 md:h-16 object-cover rounded-lg shadow-xl shrink-0">
                        <span class="font-black italic uppercase text-sm md:text-lg">${m.title}</span>
                    </td>
                    <td class="p-4 md:p-6 text-zinc-500 font-black text-[9px] uppercase tracking-widest">${m.category}</td>
                    <td class="p-4 md:p-6 text-zinc-400 font-bold italic text-sm">${m.date}</td>
                    <td class="p-4 md:p-6 font-black text-red-600 italic">★ ${m.rating}</td>
                    <td class="p-4 md:p-6 text-right">
                        <button onclick="toggleWatchlist('${m.id}')" class="mr-4 text-zinc-600 transition-all ${isLiked ? 'heart-active' : ''}">❤</button>
                        <select onchange="if(this.value !== '') addToList('${m.id}', this.value); this.value='';" class="bg-zinc-800 text-[9px] font-black uppercase rounded-lg p-1 outline-none mr-2">
                            <option value="">+ Dodaj</option>
                            ${userLists.map((l, i) => `<option value="${i}">${l.name}</option>`).join('')}
                        </select>
                        <button onclick="openModalById('${m.id}')" class="bg-zinc-800 group-hover:bg-red-600 px-4 md:px-6 py-2 rounded-full text-[10px] font-black uppercase italic text-white">Opis</button>
                    </td>
                </tr>`;}).join('');
            renderPagination();
        }

        // Reszta Twoich funkcji (createNewList, renameList, filterCategory, modal, auth) pozostaje bez zmian
        function renderPagination() {
            const totalPages = Math.ceil(filteredMovies.length / itemsPerPage);
            const container = document.getElementById('pagination-controls');
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button onclick="currentPage=${i};renderTable()" class="page-btn w-8 h-8 border border-zinc-800 rounded-lg font-black italic text-xs ${i === currentPage ? 'active' : 'text-zinc-500'}">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function filterCategory(cat) {
            document.querySelectorAll('.cat-btn').forEach(btn => {
                if (btn.innerText === cat) { btn.classList.replace('bg-zinc-900', 'bg-red-600'); btn.classList.replace('text-zinc-400', 'text-white'); }
                else { btn.classList.replace('bg-red-600', 'bg-zinc-900'); btn.classList.replace('text-white', 'text-zinc-400'); }
            });
            filteredMovies = cat === 'Wszystkie' ? movies : movies.filter(m => m.category === cat);
            currentPage = 1;
            renderTable();
        }

        function showLibrary() { document.querySelectorAll('main, #library-page, #lists-page').forEach(el => el.classList.add('hidden-section')); document.getElementById('library-page').classList.remove('hidden-section'); filterCategory('Wszystkie'); }
        function showHome() { document.querySelectorAll('main, #library-page, #lists-page').forEach(el => el.classList.add('hidden-section')); document.getElementById('home-page').classList.remove('hidden-section'); }
        function showMyLists() { 
            document.querySelectorAll('main, #library-page, #lists-page').forEach(el => el.classList.add('hidden-section')); 
            document.getElementById('lists-page').classList.remove('hidden-section'); 
            
            // Dodaj sekcję Watchlist na górze Moich List
            const container = document.getElementById('custom-lists-container');
            let wlHtml = `<div class="bg-red-600/10 p-6 rounded-[40px] border border-red-600/20 mb-10 text-center">
                <h3 class="text-2xl font-black italic uppercase text-red-600 mb-6 underline">❤ Twoja Watchlista</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${watchlist.map(id => {
                        const m = movies.find(x => x.id === id);
                        return `<div class="bg-zinc-950 p-4 rounded-3xl border border-zinc-800 flex items-center gap-4">
                            <img src="${m.img}" class="w-16 h-20 object-cover rounded-xl">
                            <div class="text-left"><h4 class="font-black italic uppercase text-sm">${m.title}</h4></div>
                        </div>`;}).join('')}
                </div>
            </div>`;
            container.innerHTML = wlHtml;
            renderCustomLists(); 
        }

        function createNewList() {
            const name = prompt("Podaj nazwę nowej listy:");
            if (name) { userLists.push({ name, movies: [] }); saveLists(); renderCustomLists(); }
        }

        function saveLists() { localStorage.setItem('userCustomLists', JSON.stringify(userLists)); }
        function addToList(movieId, listIndex) {
            if (!userLists[listIndex].movies.includes(movieId)) {
                userLists[listIndex].movies.push(movieId);
                saveLists();
                alert(`Dodano!`);
            }
        }

        function renderCustomLists() {
            const container = document.getElementById('custom-lists-container');
            userLists.map((list, idx) => {
                container.innerHTML += `
                <div class="bg-zinc-900/50 p-6 md:p-10 rounded-[40px] border border-zinc-800">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                        <h3 class="text-3xl font-black italic uppercase tracking-tighter text-white underline decoration-red-600 decoration-4 underline-offset-8">${list.name}</h3>
                        <div class="space-x-4">
                            <button onclick="userLists[${idx}].name=prompt('Nazwa:');saveLists();showMyLists();" class="text-xs font-black uppercase text-zinc-500">Zmień nazwę</button>
                            <button onclick="userLists.splice(${idx},1);saveLists();showMyLists();" class="text-xs font-black uppercase text-red-600">Usuń</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }
        function openModalById(id) {
            const m = movies.find(x => x.id === id);
            currentMovieId = m.id;
            document.getElementById('modal-title').innerText = m.title;
            document.getElementById('modal-img').src = m.img;
            document.getElementById('modal-desc').innerText = m.desc;
            document.getElementById('modal-rating').innerText = m.rating;
            document.getElementById('modal-date').innerText = m.date;
            document.getElementById('modal-trailer-link').href = m.trailer;
            toggleModal('movie-modal', true);
        }

        function handleLogin(e) {
            e.preventDefault();
            localStorage.setItem('hubUser', document.getElementById('username').value);
            location.reload();
        }

        function updateAuthUI() {
            const user = localStorage.getItem('hubUser');
            if(user) {
                document.getElementById('auth-section').innerHTML = `<span class="text-white font-black italic underline decoration-red-600 decoration-4 uppercase text-xs">${user}</span>`;
            }
        }

        function handleSearch() {
            const term = document.getElementById('movie-search').value.toLowerCase();
            filteredMovies = movies.filter(m => m.title.toLowerCase().includes(term));
            currentPage = 1;
            renderTable();
        }

        document.getElementById('star-group').addEventListener('change', (e) => {
            if (currentMovieId) localStorage.setItem(`rating-${currentMovieId}`, e.target.value);
        });

        updateAuthUI();
        initSlider();
    </script>
</body>
</html>
