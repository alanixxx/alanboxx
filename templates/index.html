<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; scroll-behavior: smooth; }
        
        /* Animacje i Slider */
        .slider-container { width: 100%; overflow: hidden; padding: 40px 0; }
        .slider-track { display: flex; gap: 2rem; width: max-content; animation: scroll 120s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-50% - 1rem)); } }
        .slider-track:hover { animation-play-state: paused; }
        
        .movie-card { 
            width: 300px; flex-shrink: 0; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; border-radius: 24px; overflow: hidden; border: 1px solid #27272a;
            position: relative; background: #111113;
        }
        .movie-card:hover { transform: translateY(-10px) scale(1.02); border-color: #dc2626; box-shadow: 0 20px 40px -10px rgba(220, 38, 38, 0.3); }

        .rating-badge {
            position: absolute; top: 1.25rem; right: 1.25rem; z-index: 10;
            background: #dc2626; color: white; padding: 6px 14px;
            border-radius: 12px; font-weight: 900; font-style: italic; font-size: 0.85rem;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.4); border: 1px solid rgba(255,255,255,0.2);
        }

        .hidden-section { display: none !important; }
        
        .modal-overlay { 
            display: none; position: fixed; inset: 0; z-index: 100; 
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px); 
            align-items: center; justify-content: center; padding: 20px;
        }

        /* Stylizacja Kategorii */
        .cat-btn { border: 1px solid #27272a; position: relative; overflow: hidden; }
        .cat-btn.active {
            background: #dc2626; color: white; border-color: #ff4d4d;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.4); transform: translateX(8px);
        }

        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #333; font-size: 2rem; cursor: pointer; transition: color 0.2s; }
        .star-rating label:hover, .star-rating label:hover ~ label, .star-rating input:checked ~ label { color: #facc15; }

        /* Paginacja */
        .page-link { transition: all 0.2s; border: 1px solid #27272a; }
        .page-link:hover:not(.active) { border-color: #dc2626; color: white; }
        .page-link.active { background: #dc2626; border-color: #dc2626; color: white; box-shadow: 0 0 15px rgba(220, 38, 38, 0.3); }
    </style>
</head>

        let currentMovieId = null;
        let filteredMovies = [...movies];
        let currentPage = 1;
        const itemsPerPage = 8;

        function initSlider() {
            const track = document.getElementById('main-slider');
            track.innerHTML = [...movies, ...movies].map(m => `
                <div class="movie-card" onclick="openModalById('${m.id}')">
                    <div class="rating-badge">★ ${m.rating.split('/')[0]}</div>
                    <img src="${m.img}" class="w-full h-[400px] object-cover">
                    <div class="p-6 text-center font-black italic uppercase tracking-tighter">
                        <div class="text-xl mb-1">${m.title}</div>
                        <div class="text-red-600 text-[10px] tracking-widest uppercase">${m.category}</div>
                    </div>
                </div>
            `).join('');
        }

        function showLibrary() {
            document.getElementById('home-page').classList.add('hidden-section');
            document.getElementById('library-page').classList.remove('hidden-section');
            renderLibrary();
        }

        function showHome() {
            document.getElementById('library-page').classList.add('hidden-section');
            document.getElementById('home-page').classList.remove('hidden-section');
        }

        function renderLibrary() {
            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedItems = filteredMovies.slice(startIndex, startIndex + itemsPerPage);
            
            const tbody = document.getElementById('library-table-body');
            tbody.innerHTML = paginatedItems.map(m => `
                <tr class="border-b border-zinc-800/50 hover:bg-white/5 transition-colors group">
                    <td class="p-6 flex items-center gap-4">
                        <img src="${m.img}" class="w-12 h-16 object-cover rounded-lg shadow-xl border border-zinc-800">
                        <span class="font-black italic uppercase tracking-tighter text-lg">${m.title}</span>
                    </td>
                    <td class="p-6 text-zinc-500 font-black text-[10px] uppercase italic tracking-widest">${m.category}</td>
                    <td class="p-6 text-zinc-400 font-bold italic">${m.date}</td>
                    <td class="p-6 font-black text-red-600 italic tracking-tighter text-xl">★ ${m.rating.split('/')[0]}</td>
                    <td class="p-6 text-right">
                        <button onclick="openModalById('${m.id}')" class="bg-zinc-800 group-hover:bg-red-600 px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all italic">Detale</button>
                    </td>
                </tr>
            `).join('');

            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredMovies.length / itemsPerPage);
            const container = document.getElementById('pagination-controls');
            let html = '';
            for(let i = 1; i <= totalPages; i++) {
                html += `<button onclick="changePage(${i})" class="page-link w-10 h-10 rounded-xl font-black ${i === currentPage ? 'active' : 'bg-zinc-900/50 text-zinc-500'}">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            renderLibrary();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function filterCategory(cat) {
            currentPage = 1;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === cat);
            });
            filteredMovies = cat === 'Wszystkie' ? movies : movies.filter(m => m.category === cat);
            renderLibrary();
        }

        function handleSearch() {
            currentPage = 1;
            const term = document.getElementById('movie-search').value.toLowerCase();
            filteredMovies = movies.filter(m => m.title.toLowerCase().includes(term));
            renderLibrary();
        }

        function toggleModal(id, show) {
            const modal = document.getElementById(id);
            modal.style.display = show ? 'flex' : 'none';
            document.body.style.overflow = show ? 'hidden' : 'auto';
        }

        function openModalById(id) {
            const m = movies.find(x => x.id === id);
            currentMovieId = m.id;
            document.getElementById('modal-title').innerText = m.title;
            document.getElementById('modal-img').src = m.img;
            document.getElementById('modal-desc').innerText = m.desc;
            document.getElementById('modal-rating').innerText = m.rating;
            document.getElementById('modal-date').innerText = m.date;
            document.getElementById('modal-trailer-link').href = m.trailer;
            
            const saved = localStorage.getItem(`rating-${m.id}`);
            document.getElementsByName('u-rating').forEach(s => s.checked = (s.value === saved));
            document.getElementById('save-status').innerText = saved ? 'Oceniono!' : '';
            
            toggleModal('movie-modal', true);
        }

        function handleLogin(e) {
            e.preventDefault();
            localStorage.setItem('hubUser', document.getElementById('username').value);
            updateAuthUI();
            toggleModal('login-modal', false);
        }

        function updateAuthUI() {
            const user = localStorage.getItem('hubUser');
            if(user) {
                document.getElementById('auth-section').innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-white font-black italic underline decoration-red-600 decoration-4 underline-offset-8 uppercase tracking-tighter">${user}</span>
                        <button onclick="logout()" class="text-[10px] text-zinc-500 hover:text-white uppercase font-black tracking-widest transition">Wyloguj</button>
                    </div>
                `;
            }
        }

        function logout() { localStorage.removeItem('hubUser'); location.reload(); }

        document.getElementById('star-group').addEventListener('change', (e) => {
            if (currentMovieId) {
                localStorage.setItem(`rating-${currentMovieId}`, e.target.value);
                document.getElementById('save-status').innerText = 'Dzięki za głos!';
            }
        });

        updateAuthUI();
        initSlider();
    </script>
</body>
</html>
